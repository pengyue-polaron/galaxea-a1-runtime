# Test-only model-agnostic dataset conversion contract.

[teleop]
config = "configs/teleop/a1_so100.toml"

[dataset]
raw_source_id = "galaxea-a1/test_experiment_raw_v3"
raw_source_roots = ["data/raw/test_experiment"]
overwrite = true

[trim]
enabled = true
anchor_window_s = 0.5
joint_deadband_rad = 0.01
gripper_deadband = 0.01
confirm_frames = 5
pre_roll_s = 0.5
post_roll_s = 0.75
max_trim_fraction = 0.20
min_kept_duration_s = 5.0

[outputs.joint_v3]
target_root = "data/processed/test_experiment_joint_v3"
archive_path = "data/exports/test_experiment_joint_v3.tar.gz"
repo_id = "galaxea-a1/test_experiment_joint_v3"

[outputs.joint_v21]
target_root = "data/processed/test_experiment_joint_v21"
archive_path = "data/exports/test_experiment_joint_v21.tar.gz"
repo_id = "galaxea-a1/test_experiment_joint_v21"

[outputs.eef_v3]
target_root = "data/processed/test_experiment_eef_v3"
archive_path = "data/exports/test_experiment_eef_v3.tar.gz"
repo_id = "galaxea-a1/test_experiment_eef_v3"

[outputs.eef_v21]
target_root = "data/processed/test_experiment_eef_v21"
archive_path = "data/exports/test_experiment_eef_v21.tar.gz"
repo_id = "galaxea-a1/test_experiment_eef_v21"

[kinematics]
urdf = "third_party/A1_SDK/install/share/mobiman/urdf/A1/urdf/A1_URDF_0607_0028.urdf"
base_link = "base_link"
tip_link = "arm_seg6"
