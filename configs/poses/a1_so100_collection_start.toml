# Git-tracked A1 + SO leader collection start pose.
# Recorded from the live hardware on 2026-07-11T18:15:40+08:00.

name = "a1_so100_collection_start"
description = "User-selected A1 and LeRobot/SO leader start pose for teleop data collection."

[topics]
joint_states = "/joint_states_host"
target = "/arm_joint_target_position"
staged_command = "/arm_joint_command_a1_staged"
relay_enable = "/a1_arm_motion_enable"
relay_status = "/a1_arm_relay_status"
gripper_command = "/gripper_position_control_host"

[joints]
names = [
  "arm_joint1",
  "arm_joint2",
  "arm_joint3",
  "arm_joint4",
  "arm_joint5",
  "arm_joint6",
]
position_rad = [
  0.012999534606933594,
  0.0010004043579101562,
  -0.07400035858154297,
  -1.569000244140625,
  0.33699989318847656,
  -0.048999786376953125,
]

[gripper]
# A1 gripper is explicitly closed by `just reset`.
enabled = true
closed_stroke_mm = 0.0
publish_hz = 10.0
publish_s = 1.0
reference_position_rad = -0.03299999237060547

[eef]
frame = "base_link"
position_m = [
  0.069480400897547,
  0.0007805132547516406,
  0.2197195507536063,
]
orientation_xyzw = [
  -0.024119767255325962,
  0.7936583066939049,
  -0.010185626889491256,
  0.6078001168543663,
]

[leader]
enabled = true
port = "/dev/serial/by-id/usb-1a86_USB_Single_Serial_5A7A016967-if00"
id = "my_leader"
use_degrees = true
action_keys = [
  "joint0.pos",
  "joint1.pos",
  "joint2.pos",
  "joint3.pos",
  "joint4.pos",
  "joint5.pos",
  "gripper.pos",
]
action_values = [
  10.68131868131868,
  -2.1538461538461537,
  0.04395604395604396,
  177.3186813186813,
  5.626373626373627,
  -78.1978021978022,
  0.0,
]

[leader_motion]
hz = 30.0
min_duration_s = 2.0
max_velocity_units_s = 60.0
hold_s = 1.0
goal_tolerance_units = 2.0
# The leader gripper is commanded fully closed at 0.0. Its normalized feedback
# can stop a few units above zero at the mechanical closed stop.
gripper_goal_tolerance_units = 5.0

[motion]
hz = 30.0
min_duration_s = 6.0
max_velocity_rad_s = 0.30
# Cold jointTracker startup may spend about 10 seconds compiling CppAD code.
# Keep enough margin for the first staged command while the relay is locked.
tracker_alignment_timeout_s = 30.0
tracker_alignment_tolerance_rad = 0.05
relay_enable_timeout_s = 3.0
max_relay_status_age_s = 1.0
hold_s = 1.0
goal_tolerance_rad = 0.08
