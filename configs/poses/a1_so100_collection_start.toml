# Git-tracked SO leader reset paired with the shared A1 start pose.

[a1]
config = "configs/poses/a1_collection_start.toml"

[leader]
enabled = true
action_keys = [
  "joint0.pos",
  "joint1.pos",
  "joint2.pos",
  "joint3.pos",
  "joint4.pos",
  "joint5.pos",
  "gripper.pos",
]
action_values = [
  10.68131868131868,
  -2.1538461538461537,
  0.04395604395604396,
  177.3186813186813,
  5.626373626373627,
  -78.1978021978022,
  0.0,
]

[leader_motion]
hz = 30.0
min_duration_s = 2.0
max_velocity_units_s = 60.0
hold_s = 1.0
goal_tolerance_units = 2.0
# The leader gripper is commanded fully closed at 0.0. Its normalized feedback
# can stop a few units above zero at the mechanical closed stop.
gripper_goal_tolerance_units = 5.0
