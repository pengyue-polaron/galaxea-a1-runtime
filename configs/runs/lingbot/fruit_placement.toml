# Scripted live LingBot evaluation plan. Every attempt still requires Enter.

[deployment]
config = "configs/deployments/lingbot/fruit_placement_eef.toml"

[reset]
pose = "configs/poses/a1_collection_start.toml"

[batch]
schema_version = 1
id = "fruit-placement-scripted"
# One initial attempt plus two repetitions = three runs per prompt.
retries_per_prompt = 2
task_ids = [
  "banana_blue_plate",
  "banana_bowl",
  "lemon_blue_plate",
  "red_mango_blue_plate",
  "red_mango_bowl",
  "lemon_bowl",
]
