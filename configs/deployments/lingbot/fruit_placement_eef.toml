[system]
config = "configs/system/a1.toml"

[backend]
config = "configs/inference/backends/lingbot_va.toml"

[model]
config = "configs/models/lingbot/fruit_placement_eef.toml"

[tasks]
config = "configs/tasks/fruit_placement.toml"

[deployment]
id = "lingbot-fruit-placement-eef"
ready = true

[session]
tmux = "lingbot-a1"
model_tmux = "lingbot-va-server"
master_port = 29501
startup_timeout_s = 300.0

[server]
host = "127.0.0.1"
port = 1106
connect_timeout_s = 2.0
close_timeout_s = 10.0

[observations]
front_key = "observation.images.front"
wrist_key = "observation.images.wrist"

[execution]
execute = true
step_mode = false
step_actions = false
# Two predicted frames produce eight actions per call. 66 calls cover the
# longest 526-step training episode without consuming the full open-loop horizon.
max_model_calls = 66
execute_frames = 2
kv_observations_per_frame = 4
exec_rate = 30.0
print_actions = false
review_deadband_m = 0.001

[recording]
agent_view_enabled = true
output_root = "outputs/inference/lingbot-fruit-placement-eef/recordings"
