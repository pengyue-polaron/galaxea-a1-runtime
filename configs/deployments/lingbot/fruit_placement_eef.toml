[system]
config = "configs/system/a1.toml"

[backend]
config = "configs/inference/backends/lingbot_va.toml"

[model]
config = "configs/models/lingbot/fruit_placement_eef.toml"

[deployment]
id = "lingbot-fruit-placement-eef"
ready = true

[session]
tmux = "lingbot-a1"
model_tmux = "lingbot-va-server"
master_port = 29501
startup_timeout_s = 300.0

[server]
host = "127.0.0.1"
port = 1106
connect_timeout_s = 2.0
close_timeout_s = 10.0
prompt = "Put the banana into the blue plate"

[observations]
front_key = "observation.images.front"
wrist_key = "observation.images.wrist"

[execution]
execute = false
step_mode = true
step_actions = true
no_kv_update = false
max_model_calls = 1
execute_frames = 1
kv_observations_per_frame = 4
condition_on_ee_state = true
initial_ee_pose = []
exec_rate = 30.0
print_actions = true
review_deadband_m = 0.001

[action]
servo_gain = 1.0
servo_max_extra_m = 0.04
servo_settle_s = 0.0
servo_tolerance_m = 0.01
servo_corrections = 0
cache_actual_feedback = false
