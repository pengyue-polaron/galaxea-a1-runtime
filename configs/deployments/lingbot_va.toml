# LingBot checkpoint and rollout contract. Physical hardware, cameras, topics,
# workspace, quaternion handling, and gripper feedback live in the system file.

[system]
config = "configs/system/a1.toml"

[session]
tmux = "lingbot-a1"

[server]
host = "127.0.0.1"
port = 1106
prompt = "REPLACE_WITH_NEW_TASK_PROMPT"

[policy_server]
tmux = "lingbot-va-server"
checkout = "/home/pengyue/lingbot-va"
python = "/home/pengyue/lingbot-va/.env312/bin/python"
base_model = "models/base/lingbot-va-base"
checkpoint = "models/checkpoints/lingbot/a1_agentview_square/latest"
model_root = "models/runtime/lingbot/a1_agentview_square/latest"
save_root = "outputs/lingbot_va_server"
master_port = 29501
startup_timeout_s = 120.0
expected_weight_size_bytes = 10177831668
deployment_ready = false
text_encoder_device = "cpu"
seed = 42
height = 256
width = 256
frame_chunk_size = 4
action_per_frame = 4
attention_window = 30
guidance_scale = 5.0
action_guidance_scale = 1.0
video_inference_steps = 5
action_inference_steps = 10
snr_shift = 5.0
action_snr_shift = 1.0
used_action_channel_ids = [0, 1, 2, 3, 4, 5, 6, 28]
# Replace both arrays from the new training run before deployment_ready=true.
q01_source = [-0.0205872823, -0.0816254982, -0.1587257938, -0.1585423197, -0.0502871116, -0.1319347475, 0.7473538256, 0.0]
q99_source = [0.3058666354, 0.1699677740, 0.1147735418, 0.1790102567, 0.6598575765, 0.3804598969, 0.9999967217, 1.0]

[observations]
front_key = "observation.images.front"
wrist_key = "observation.images.wrist"

[execution]
execute = false
step_mode = true
step_actions = false
no_kv_update = false
max_model_calls = 36
execute_frames = 4
condition_on_ee_state = true
lingbot_frame_chunk_size = 4
lingbot_action_per_frame = 4
exec_rate = 30.0
print_actions = true
review_deadband_m = 0.001

[action]
pose_mode = "episode-relative"
servo_gain = 1.0
servo_max_extra_m = 0.04
servo_settle_s = 0.0
servo_tolerance_m = 0.01
servo_corrections = 0
cache_actual_feedback = false

[gripper_policy]
stroke_scale_mm = 80.0
stroke_offset_mm = 0.0
output_stroke_min_mm = 0.0
output_stroke_max_mm = 80.0
command_mode = "continuous"
command_open_threshold = 0.5
