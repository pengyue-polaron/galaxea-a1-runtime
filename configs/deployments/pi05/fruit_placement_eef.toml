[system]
config = "configs/system/a1.toml"

[backend]
config = "configs/inference/backends/openpi_pi05.toml"

[model]
config = "configs/models/pi05/fruit_placement_eef.toml"

[tasks]
config = "configs/tasks/fruit_placement.toml"

[deployment]
id = "pi05-fruit-placement-eef"
ready = true

[session]
tmux = "pi05-a1"
model_tmux = "pi05-policy-server"
startup_timeout_s = 300.0

[server]
host = "127.0.0.1"
port = 8001
connect_timeout_s = 2.0
close_timeout_s = 10.0

[observations]
front_key = "observation/front_image"
wrist_key = "observation/wrist_image"

[execution]
execute = true
step_mode = false
step_actions = false
# 53 ten-action chunks cover the longest 526-step training episode.
max_model_calls = 53
execute_actions_per_inference = 10
exec_rate = 30.0
print_actions = true
review_deadband_m = 0.001

[action]
servo_settle_s = 0.5
servo_tolerance_m = 0.01
servo_corrections = 1
