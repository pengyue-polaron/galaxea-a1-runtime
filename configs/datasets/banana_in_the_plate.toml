# Reproducible LingBot-VA package for `just convert banana_in_the_plate`.

[teleop]
config = "configs/teleop/a1_so100.toml"

[dataset]
raw_root = "data/raw/banana_in_the_plate"
lerobot_v3_root = "data/processed/banana_in_the_plate_lerobot_v3"
