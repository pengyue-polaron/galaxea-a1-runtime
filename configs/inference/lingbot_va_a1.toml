# Git-tracked runtime contract for LingBot-VA EEF inference on Galaxea A1.
# Edit this file when policy server, cameras, EEF workspace, or gripper mapping
# changes. The normal `just lingbot` path reads this file and does not use
# ad hoc per-run bridge flags.

[session]
tmux = "lingbot-a1"

[server]
host = "127.0.0.1"
port = 1106
prompt = "Put the banana in the blue plate."

[policy_server]
tmux = "lingbot-va-server"
checkout = "/home/pengyue/lingbot-va"
python = "/home/pengyue/lingbot-va/.env312/bin/python"
base_model = "models/base/lingbot-va-base"
checkpoint = "models/checkpoints/lingbot/a1_banana_in_plate/checkpoint_step_500"
model_root = "models/runtime/lingbot/a1_banana_in_plate/checkpoint_step_500"
save_root = "outputs/lingbot_va_server"
master_port = 29501
startup_timeout_s = 120.0
expected_weight_size_bytes = 10177831668
text_encoder_device = "cpu"
seed = 42
height = 256
width = 256
frame_chunk_size = 4
action_per_frame = 4
attention_window = 30
guidance_scale = 5.0
action_guidance_scale = 1.0
video_inference_steps = 5
action_inference_steps = 10
snr_shift = 5.0
action_snr_shift = 1.0
used_action_channel_ids = [0, 1, 2, 3, 4, 5, 6, 28]
q01_source = [
  -0.02058728225529194,
  -0.08162549816071987,
  -0.15872579380869867,
  -0.15854231968522073,
  -0.05028711162507534,
  -0.13193474754691123,
  0.7473538255691529,
  0.0,
]
q99_source = [
  0.3058666354417801,
  0.16996777400374424,
  0.11477354176342505,
  0.179010256677866,
  0.6598575764894486,
  0.3804598969221116,
  0.9999967217445374,
  1.0,
]

[execution]
execute = true
step_mode = false
step_actions = false
no_kv_update = false
max_model_calls = 36
execute_frames = 4
condition_on_ee_state = true
lingbot_frame_chunk_size = 4
lingbot_action_per_frame = 4
exec_rate = 30.0
print_actions = true
review_deadband_m = 0.001

[topics]
state_pose = "/end_effector_pose"
state_gripper = "/gripper_stroke_host"
cmd_pose = "/a1_ee_target"
cmd_gripper = "/gripper_position_control_host"
motion_enable = "/a1_arm_motion_enable"
relay_status = "/a1_arm_relay_status"
staged_command = "/arm_joint_command_a1_staged"

[relay]
enable_timeout_s = 2.0
max_status_age_s = 1.0

[eef]
command_frame = "world"
action_pose_mode = "episode-relative"
orientation_mode = "hold-current"
xyz_min = [0.06, -0.27, 0.06]
xyz_max = [0.44, 0.14, 0.50]
min_quat_norm = 0.25
max_feedback_age_s = 0.5
feedback_wait_timeout_s = 5.0

[servo]
gain = 1.0
max_extra_m = 0.04
settle_s = 0.0
tolerance_m = 0.01
corrections = 0
cache_actual_feedback = false

[gripper]
stroke_scale_mm = 80.0
stroke_offset_mm = 0.0
stroke_min_mm = 0.0
stroke_max_mm = 80.0
command_mode = "continuous"
command_open_threshold = 0.5
feedback_open_threshold_mm = 30.0

[cameras]
width = 640
height = 480
fps = 30

[cameras.front]
serial = "341522300456"
observation_key = "observation.images.front"
auto_exposure = true
exposure = 140
gain = 32
auto_white_balance = true
white_balance = 4600

[cameras.wrist]
device = "/dev/v4l/by-id/usb-Global_Shutter_Camera_Global_Shutter_Camera_01.00.00-video-index0"
backend_api = "v4l2"
observation_key = "observation.images.wrist"
