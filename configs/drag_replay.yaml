project_root: ${oc.env:DATACOACH_ROOT,/home/pengyue/Codespace/DataCoach}

third_party:
  a1_sdk_root: ${project_root}/third_party/A1_SDK

camera_server:
  bind: tcp://*:5558
  jpeg_quality: 85
  loop_sleep_s: 0.001
  startup_timeout_s: 3.0
  stall_timeout_s: 2.0
  debug_dump_enable: false
  debug_dump_dir: ${project_root}/data/debug/model_input_frames
  debug_dump_every_n: 30
  debug_dump_max_per_cam: 200
  cameras:
    - id: cam_0
      backend: realsense
      serial: "341522300456"
      width: 640
      height: 480
      fps: 30
      enabled: true
    - id: cam_1
      backend: opencv
      device: /dev/video6
      backend_api: v4l2
      width: 640
      height: 480
      fps: 30
      enabled: true

a1_replay_bridge:
  node_name: a1_replay_bridge
  anonymous: false
  disable_ros_signals: false
  publish_rate_hz: 50
  fallback_gripper: 0.0
  require_command_pose: true
  publish_debug: false
  state_pose_topic: /end_effector_pose
  state_gripper_topic: /gripper_stroke_host
  cmd_pose_topic: /a1_ee_target
  cmd_joint_topic: /arm_joint_target_position
  cmd_gripper_position_topic: /gripper_position_control_host
  cmd_gripper_force_topic: /gripper_force_control_host
  zmq_cmd_bind: tcp://127.0.0.1:5556
  zmq_state_bind: tcp://127.0.0.1:5557

data_collector:
  task_name: rollout
  demo_index: 0
  save_video: true
  camera_fps: 15
  wait_for_enter: true
  min_camera_coverage_ratio: 0.9
  max_camera_start_lag_s: 1.0
  max_camera_end_lag_s: 1.0
  cameras:
    - id: cam_0
    - id: cam_1
  storage_path: ${project_root}/data/raw_data
