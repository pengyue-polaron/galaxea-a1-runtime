[project]
name = "a1-research"
version = "0.1.0"
requires-python = ">=3.11,<3.13"

dependencies = [
    "tyro>=1.0.8",
    "hydra-core>=1.3.2",
    "omegaconf>=2.3.0",
    "huggingface-hub>=0.34.2,<0.36.0",
    "lerobot",
    "pandas>=2.3.3",
    "pyrealsense2>=2.56.5.9235",
    "rospkg>=1.6.0",
    "catkin-pkg>=1.0.0",
    "torch==2.7.1",
    "torchvision",
    "torchaudio",
    "chex>=0.1.90",
]

[project.optional-dependencies]
train = ["openpi"]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["a1"]

[tool.uv]
environments = ["sys_platform == 'linux' and (platform_machine == 'x86_64' or platform_machine == 'aarch64' or platform_machine == 'arm64')"]

[tool.uv.sources]
lerobot = { git = "https://github.com/huggingface/lerobot", rev = "0cf864870cf29f4738d3ade893e6fd13fbd7cdb5" }

[dependency-groups]
dev = [
    "ipykernel>=7.1.0",
    "ipywidgets>=8.1.8",
    "matplotlib>=3.10.8",
    "pre-commit>=4.5.1",
    "pynvml>=13.0.1",
    "pytest>=9.0.2",
    "ruff>=0.14.14",
]
